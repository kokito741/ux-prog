<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Detail | Digital Museum Browser</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Museum</h1>
      <nav>
        <a href="/" title="Home">🏠</a>
        <a href="javascript:history.back()" title="Go back">← Back</a>
        <a href="/auth.html" class="nav-auth" title="Account">👤</a>
      </nav>
    </header>
    <main>
      <section id="museum" class="panel"></section>
      <section>
        <h2>Artifacts</h2>
        <div id="artifacts" class="grid"></div>
      </section>
      <section class="panel">
        <h2>Comments</h2>
        <form id="commentForm">
          <textarea
            name="content"
            placeholder="Write a comment..."
            required
          ></textarea>
          <button type="submit">Post comment</button>
        </form>
        <div id="comments"></div>
      </section>
      <section class="panel">
        <h2>Rate this museum</h2>
        <form id="ratingForm">
          <select name="score" required>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
          <button type="submit">Submit rating</button>
        </form>
      </section>
    </main>

    <!-- Artifact Modal -->
    <div id="artifactModal" class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="modal-close">×</button>
        <div class="modal-body">
          <div class="modal-left">
            <div class="artifact-images">
              <div id="modalImageSlideshow" class="slideshow"></div>
            </div>
          </div>
          <div class="modal-right">
            <div class="artifact-info">
              <h2 id="modalArtifactName"></h2>
              <div class="artifact-meta">
                <p>
                  <strong>Category:</strong>
                  <span id="modalArtifactCategory"></span>
                </p>
                <p>
                  <strong>Rating:</strong>
                  <span id="modalArtifactRating"></span>
                </p>
              </div>
              <div class="artifact-text-container">
                <div id="modalArtifactText" class="artifact-text"></div>
                <div class="artifact-pagination">
                  <button
                    class="artifact-text-btn prev"
                    data-text-direction="-1"
                  >
                    ‹ Previous
                  </button>
                  <span id="textPageIndicator" class="page-indicator"></span>
                  <button
                    class="artifact-text-btn next"
                    data-text-direction="1"
                  >
                    Next ›
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      const {
        api,
        getParam,
        byId,
        renderComments,
        ratingText,
        imageUrls,
        renderSlideshow,
        initSlideshows,
      } = window.museumApp;
      const museumId = getParam("id");
      let currentArtifact = null;
      let textPages = [];
      let currentTextPage = 0;

      async function load() {
        try {
          const museum = await api.get(`/api/museums/${museumId}`);
          byId("museum").innerHTML = `
          ${renderSlideshow(imageUrls(museum.image_url, "museum"), museum.name)}
          <h2>${museum.name}</h2>
          <p class="muted">${museum.location}</p>
          <p>${museum.description}</p>
          <p>${ratingText(museum)}</p>
        `;
          byId("artifacts").innerHTML = museum.artifacts
            .map(
              (artifact) => `
            <article class="card artifact-card" data-artifact-id="${artifact.id}">
              ${renderSlideshow(imageUrls(artifact.image_url, "artifact"), artifact.name)}
              <div class="content">
                <h3>${artifact.name}</h3>
                <p class="muted">${artifact.category}</p>
              </div>
            </article>`,
            )
            .join("");
          initSlideshows();
          const comments = await api.get(`/api/comments/museum/${museumId}`);
          renderComments(byId("comments"), comments);

          // Add click handlers to artifact cards
          document.querySelectorAll(".artifact-card").forEach((card) => {
            card.addEventListener("click", async () => {
              const artifactId = card.dataset.artifactId;
              const artifact = museum.artifacts.find(
                (a) => a.id === Number(artifactId),
              );
              if (artifact) {
                await openArtifactModal(artifact);
              }
            });
          });
        } catch (error) {
          byId("museum").innerHTML = `<p class="muted">${error.message}</p>`;
        }
      }

      function splitOntPages(text, pageHeightApprox = 300) {
        if (!text) return [];
        const lines = text.split("\n").filter((line) => line.trim());
        const pages = [];
        let currentPage = [];
        let currentHeight = 0;

        lines.forEach((line) => {
          const lineHeight = 25; // approximate height per line
          if (
            currentHeight + lineHeight > pageHeightApprox &&
            currentPage.length > 0
          ) {
            pages.push(currentPage.join("\n"));
            currentPage = [];
            currentHeight = 0;
          }
          currentPage.push(line);
          currentHeight += lineHeight;
        });

        if (currentPage.length > 0) {
          pages.push(currentPage.join("\n"));
        }

        return pages.length > 0 ? pages : [text];
      }

      async function openArtifactModal(artifact) {
        currentArtifact = artifact;
        currentTextPage = 0;

        // Set artifact name and category
        byId("modalArtifactName").textContent = artifact.name;
        byId("modalArtifactCategory").textContent = artifact.category;
        byId("modalArtifactRating").textContent = ratingText(artifact);

        // Split text into pages
        const fullText =
          (artifact.description || "") +
          "\n\n" +
          (artifact.historical_background || "");
        textPages = splitOntPages(fullText.trim());

        // Show the first page
        showArtifactTextPage(0);

        // Setup image slideshow
        const images = imageUrls(artifact.image_url, "artifact");
        const slideshowDiv = byId("modalImageSlideshow");
        slideshowDiv.innerHTML = renderSlideshow(images, artifact.name);
        initSlideshows(slideshowDiv);

        // Show the modal
        byId("artifactModal").classList.add("active");
      }

      function showArtifactTextPage(pageIndex) {
        if (pageIndex < 0 || pageIndex >= textPages.length) return;
        currentTextPage = pageIndex;

        byId("modalArtifactText").textContent = textPages[pageIndex];
        byId("textPageIndicator").textContent =
          textPages.length > 1 ? `${pageIndex + 1} / ${textPages.length}` : "";

        // Update button states
        document.querySelectorAll(".artifact-text-btn").forEach((btn) => {
          const direction = Number(btn.dataset.textDirection);
          btn.disabled =
            (direction < 0 && pageIndex === 0) ||
            (direction > 0 && pageIndex === textPages.length - 1);
        });
      }

      function closeArtifactModal() {
        byId("artifactModal").classList.remove("active");
        currentArtifact = null;
      }

      // Modal event listeners
      byId("artifactModal").addEventListener("click", (e) => {
        if (
          e.target === e.currentTarget ||
          e.target.classList.contains("modal-overlay")
        ) {
          closeArtifactModal();
        }
      });

      document
        .querySelector(".modal-close")
        .addEventListener("click", closeArtifactModal);

      // Text pagination buttons
      document.querySelectorAll(".artifact-text-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const direction = Number(btn.dataset.textDirection);
          showArtifactTextPage(currentTextPage + direction);
        });
      });

      byId("commentForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          await api.post(
            "/api/comments",
            {
              target_type: "museum",
              target_id: Number(museumId),
              content: new FormData(e.target).get("content"),
            },
            true,
          );
          e.target.reset();
          load();
        } catch (error) {
          alert(error.message);
        }
      });
      byId("ratingForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const data = await api.post(
            "/api/ratings",
            {
              target_type: "museum",
              target_id: Number(museumId),
              score: Number(new FormData(e.target).get("score")),
            },
            true,
          );
          alert(data.message);
          load();
        } catch (error) {
          alert(error.message);
        }
      });

      load();
    </script>
  </body>
</html>
