<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Detail | Digital Museum Browser</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Museum</h1>
      <nav><a href="/">Home</a><a href="/museums.html">Back to museums</a></nav>
    </header>
    <main>
      <section id="museum" class="panel"></section>
      <section>
        <h2>Artifacts</h2>
        <div id="artifacts" class="grid"></div>
      </section>
      <section class="panel">
        <h2>Comments</h2>
        <form id="commentForm">
          <textarea name="content" placeholder="Write a comment..." required></textarea>
          <button type="submit">Post comment</button>
        </form>
        <div id="comments"></div>
      </section>
      <section class="panel">
        <h2>Rate this museum</h2>
        <form id="ratingForm">
          <select name="score" required>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
          <button type="submit">Submit rating</button>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
    <script>
      const { api, getParam, byId, renderComments, ratingText } = window.museumApp;
      const museumId = getParam("id");
      async function load() {
        const museum = await api.get(`/api/museums/${museumId}`);
        byId("museum").innerHTML = `
          <h2>${museum.name}</h2>
          <p class="muted">${museum.location}</p>
          <p>${museum.description}</p>
          <p>${ratingText(museum)}</p>
        `;
        byId("artifacts").innerHTML = museum.artifacts
          .map(
            (artifact) => `
            <article class="card">
              <img src="${artifact.image_url || "https://picsum.photos/400/250?artifact"}" alt="${artifact.name}">
              <div class="content">
                <h3>${artifact.name}</h3>
                <p class="muted">${artifact.category}</p>
                <a href="/artifact.html?id=${artifact.id}">View exhibit</a>
              </div>
            </article>`
          )
          .join("");
        const comments = await api.get(`/api/comments/museum/${museumId}`);
        renderComments(byId("comments"), comments);
      }

      byId("commentForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = await api.post(
          "/api/comments",
          { target_type: "museum", target_id: Number(museumId), content: new FormData(e.target).get("content") },
          true
        );
        if (data.id) {
          e.target.reset();
          load();
        } else {
          alert(data.error || (data.errors && data.errors.join(", ")) || "Unable to post comment");
        }
      });
      byId("ratingForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = await api.post(
          "/api/ratings",
          { target_type: "museum", target_id: Number(museumId), score: Number(new FormData(e.target).get("score")) },
          true
        );
        alert(data.message || data.error || (data.errors && data.errors.join(", ")));
        load();
      });
      load();
    </script>
  </body>
</html>
