<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth | Digital Museum Browser</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Account</h1>
      <nav><a href="/">Home</a><a href="/museums.html">Museums</a></nav>
    </header>
    <main class="grid">
      <section class="panel">
        <h2>Register</h2>
        <form id="registerForm">
          <input name="username" placeholder="Username" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Create account</button>
        </form>
      </section>
      <section class="panel">
        <h2>Login</h2>
        <form id="loginForm">
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Sign in</button>
        </form>
      </section>
      <section class="panel">
        <h3>Session</h3>
        <p id="sessionStatus" class="muted">Not logged in</p>
        <button id="logoutButton" type="button">Logout</button>
        <button id="deleteProfileButton" type="button" class="danger">Delete profile</button>
      </section>
    </main>
    <script src="/app.js"></script>
    <script>
      const { api, byId } = window.museumApp;
      const status = byId("sessionStatus");
      function refreshSessionStatus() {
        status.textContent = localStorage.getItem("token") ? "Logged in" : "Not logged in";
      }
      refreshSessionStatus();

      byId("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const f = new FormData(e.target);
          await api.post("/api/auth/register", Object.fromEntries(f.entries()));
          alert("Registered");
        } catch (error) {
          alert(error.message);
        }
      });
      byId("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const f = new FormData(e.target);
          const data = await api.post("/api/auth/login", Object.fromEntries(f.entries()));
          localStorage.setItem("token", data.token);
          refreshSessionStatus();
          alert("Logged in");
        } catch (error) {
          alert(error.message);
        }
      });

      byId("logoutButton").addEventListener("click", () => {
        localStorage.removeItem("token");
        refreshSessionStatus();
        alert("Logged out");
      });

      byId("deleteProfileButton").addEventListener("click", async () => {
        if (!localStorage.getItem("token")) return alert("Login required");
        if (!confirm("Delete your profile? Your comments and ratings will stay visible.")) return;
        try {
          await api.del("/api/auth/profile", true);
          localStorage.removeItem("token");
          refreshSessionStatus();
          alert("Profile deleted");
        } catch (error) {
          alert(error.message);
        }
      });
    </script>
  </body>
</html>
