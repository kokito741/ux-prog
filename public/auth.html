<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth | Digital Museum Browser</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Account</h1>
      <nav>
        <a href="/" title="Home"><img src="/images/home.png" alt="Home" /></a>
        <a href="javascript:history.back()" title="Go back">← Back</a>
      </nav>
    </header>
    <main>
      <div class="auth-container">
        <div class="auth-section">
          <section class="auth-card">
            <div class="card-header">
              <h2>Create Account</h2>
              <p class="card-subtitle">Join our museum community</p>
            </div>
            <form id="registerForm" class="auth-form">
              <div class="form-group">
                <label for="username">Username</label>
                <input
                  id="username"
                  name="username"
                  placeholder="Choose your username"
                  required
                />
              </div>
              <div class="form-group">
                <label for="reg-email">Email</label>
                <input
                  id="reg-email"
                  name="email"
                  type="email"
                  placeholder="your@email.com"
                  required
                />
              </div>
              <div class="form-group">
                <label for="reg-password">Password</label>
                <input
                  id="reg-password"
                  name="password"
                  type="password"
                  placeholder="At least 8 characters"
                  required
                />
              </div>
              <button type="submit" class="btn-primary">Create account</button>
            </form>
          </section>

          <section class="auth-card">
            <div class="card-header">
              <h2>Sign In</h2>
              <p class="card-subtitle">Access your account</p>
            </div>
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="login-email">Email</label>
                <input
                  id="login-email"
                  name="email"
                  type="email"
                  placeholder="your@email.com"
                  required
                />
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input
                  id="login-password"
                  name="password"
                  type="password"
                  placeholder="Enter your password"
                  required
                />
              </div>
              <button type="submit" class="btn-primary">Sign in</button>
            </form>
          </section>
        </div>

        <section class="session-card">
          <div class="card-header">
            <h2>Session</h2>
            <p class="card-subtitle">Manage your account</p>
          </div>
          <div class="session-content">
            <div class="status-indicator">
              <div class="status-badge" id="statusBadge"></div>
              <div>
                <p class="status-label">Current Status</p>
                <p id="sessionStatus" class="status-text">Not logged in</p>
              </div>
            </div>
            <div class="session-actions">
              <button
                id="logoutButton"
                type="button"
                class="btn-secondary"
                disabled
              >
                Sign out
              </button>
              <button
                id="deleteProfileButton"
                type="button"
                class="btn-danger"
                disabled
              >
                Delete profile
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <p>&copy; 2025 Digital Museum Browser. All rights reserved.</p>
      <div class="footer-feedback">
        <a href="https://forms.gle/SJhiNYL7GmPuoAo86" target="_blank" rel="noopener noreferrer">
          &#128172; Share Your Feedback
        </a>
      </div>
    </footer>
    <script src="/app.js"></script>
    <script>
      const { api, byId } = window.museumApp;
      const status = byId("sessionStatus");
      const logoutButton = byId("logoutButton");
      const deleteProfileButton = byId("deleteProfileButton");
      const statusBadge = byId("statusBadge");

      function refreshSessionStatus() {
        const isLoggedIn = !!localStorage.getItem("token");
        status.textContent = isLoggedIn ? "Logged in" : "Not logged in";
        logoutButton.disabled = !isLoggedIn;
        deleteProfileButton.disabled = !isLoggedIn;

        // Update status badge
        if (isLoggedIn) {
          statusBadge.classList.add("logged-in");
        } else {
          statusBadge.classList.remove("logged-in");
        }
      }
      refreshSessionStatus();

      byId("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const f = new FormData(e.target);
          await api.post("/api/auth/register", Object.fromEntries(f.entries()));
          alert("Registered");
        } catch (error) {
          alert(error.message);
        }
      });
      byId("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const f = new FormData(e.target);
          const data = await api.post(
            "/api/auth/login",
            Object.fromEntries(f.entries()),
          );
          localStorage.setItem("token", data.token);
          refreshSessionStatus();
          alert("Logged in");
        } catch (error) {
          alert(error.message);
        }
      });

      byId("logoutButton").addEventListener("click", () => {
        localStorage.removeItem("token");
        refreshSessionStatus();
        alert("Logged out");
      });

      byId("deleteProfileButton").addEventListener("click", async () => {
        if (!localStorage.getItem("token")) return alert("Login required");
        if (
          !confirm(
            "Delete your profile? Your comments and ratings will stay visible.",
          )
        )
          return;
        try {
          await api.del("/api/auth/profile", true);
          localStorage.removeItem("token");
          refreshSessionStatus();
          alert("Profile deleted");
        } catch (error) {
          alert(error.message);
        }
      });
    </script>
  </body>
</html>
