<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category | Digital Museum Browser</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1 id="categoryTitle"></h1>
      <nav>
        <a href="/" title="Home"><img src="/images/home.png" alt="Home" /></a>
        <a href="javascript:history.back()" title="Go back">← Back</a>
        <a href="/auth.html" class="nav-auth" title="Account"
          ><img src="/images/user.png" alt="Account"
        /></a>
      </nav>
    </header>
    <main>
      <section>
        <div id="artifacts" class="grid"></div>
      </section>
    </main>

    <!-- Artifact Modal -->
    <div id="artifactModal" class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="modal-close">×</button>
        <div class="modal-body">
          <div class="modal-left">
            <div class="artifact-images">
              <div id="modalImageSlideshow" class="slideshow"></div>
            </div>
          </div>
          <div class="modal-right">
            <div class="artifact-info">
              <h2 id="modalArtifactName"></h2>
              <div class="artifact-meta">
                <p>
                  <strong>Category:</strong>
                  <span id="modalArtifactCategory"></span>
                </p>
                <p>
                  <strong>Rating:</strong>
                  <span id="modalArtifactRating"></span>
                </p>
              </div>
              <div class="artifact-text-container">
                <div id="modalArtifactText" class="artifact-text"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      const {
        api,
        getParam,
        byId,
        imageUrls,
        renderSlideshow,
        initSlideshows,
        ratingText,
      } = window.museumApp;
      const category = getParam("name");
      let currentArtifact = null;
      let allArtifactsData = [];

      async function load() {
        try {
          const allArtifacts = await api.get("/api/artifacts");
          allArtifactsData = allArtifacts;
          const artifacts = allArtifacts.filter((a) => a.category === category);
          byId("categoryTitle").textContent = `${category} Artifacts`;
          byId("artifacts").innerHTML = artifacts
            .map(
              (artifact) => `
            <article class="card artifact-card" data-artifact-id="${artifact.id}">
              ${renderSlideshow(imageUrls(artifact.image_url, "artifact"), artifact.name)}
              <div class="content">
                <h3>${artifact.name}</h3>
                <p class="muted"><a href="/category.html?name=${encodeURIComponent(artifact.category)}" class="category-link">${artifact.category}</a></p>
              </div>
            </article>`,
            )
            .join("");
          initSlideshows();

          // Add click handlers to artifact cards
          document.querySelectorAll(".artifact-card").forEach((card) => {
            card.addEventListener("click", async () => {
              const artifactId = card.dataset.artifactId;
              const artifact = allArtifactsData.find(
                (a) => a.id === Number(artifactId),
              );
              if (artifact) {
                await openArtifactModal(artifact);
              }
            });
          });
        } catch (error) {
          byId("artifacts").innerHTML = `<p class="muted">${error.message}</p>`;
        }
      }

      async function openArtifactModal(artifact) {
        currentArtifact = artifact;

        // Set artifact name and category
        byId("modalArtifactName").textContent = artifact.name;
        byId("modalArtifactCategory").innerHTML =
          `<a href="/category.html?name=${encodeURIComponent(artifact.category)}" class="category-link">${artifact.category}</a>`;
        byId("modalArtifactRating").textContent = ratingText(artifact);

        // Display full text
        const fullText =
          (artifact.description || "") +
          "\n\n" +
          (artifact.historical_background || "");
        byId("modalArtifactText").textContent = fullText.trim();

        // Setup image slideshow
        const images = imageUrls(artifact.image_url, "artifact");
        const slideshowDiv = byId("modalImageSlideshow");
        slideshowDiv.innerHTML = renderSlideshow(images, artifact.name);
        initSlideshows(slideshowDiv);

        // Show the modal
        byId("artifactModal").classList.add("active");
      }

      function closeArtifactModal() {
        byId("artifactModal").classList.remove("active");
        currentArtifact = null;
      }

      // Modal event listeners
      byId("artifactModal").addEventListener("click", (e) => {
        if (
          e.target === e.currentTarget ||
          e.target.classList.contains("modal-overlay")
        ) {
          closeArtifactModal();
        }
      });

      document
        .querySelector(".modal-close")
        .addEventListener("click", closeArtifactModal);

      load();
    </script>
  </body>
</html>
